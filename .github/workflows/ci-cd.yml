name: CI and Publish

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  security:
    name: Security Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Export production requirements
        run: uv export --frozen --no-dev --no-emit-project --format requirements-txt -o requirements-ci.txt

      - name: Audit Python dependencies (high+)
        run: uvx pip-audit -r requirements-ci.txt

      - name: OSV dependency scan
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            -w /src \
            ghcr.io/google/osv-scanner:v2.3.5 \
            scan --lockfile=uv.lock

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"

  test:
    name: Test and Build
    runs-on: ubuntu-latest
    env:
      AVAILABLE_BROWSERS: chromium-headless
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Install Chromium
        run: uv run playwright install chromium --with-deps

      - name: Run tests
        run: uv run pytest -q --cov=executor --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: coverage
          path: coverage.xml

      - name: Build package
        run: uv build

  docker_security:
    name: Docker Security Gate
    runs-on: ubuntu-latest
    needs:
      - security
      - test
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image for security scan
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.chainguard
          load: true
          push: false
          tags: local/playwright-http:${{ github.sha }}

      - name: Trivy image scan (blocking)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: local/playwright-http:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"

  docker_smoke:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    needs:
      - security
      - test
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image for smoke test
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.chainguard
          load: true
          push: false
          tags: local/playwright-http-smoke:${{ github.sha }}

      - name: Run container and wait for Docker health
        shell: bash
        run: |
          docker run -d --name playwright-http-smoke local/playwright-http-smoke:${{ github.sha }}
          for i in {1..60}; do
            container_status="$(docker inspect --format='{{.State.Status}}' playwright-http-smoke 2>/dev/null || echo missing)"
            health_status="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' playwright-http-smoke 2>/dev/null || echo missing)"
            if [ "$container_status" != "running" ]; then
              echo "Smoke test failed: container status is '$container_status'"
              docker inspect --format='{{json .State}}' playwright-http-smoke || true
              docker logs playwright-http-smoke || true
              exit 1
            fi
            if [ "$health_status" = "healthy" ]; then
              echo "Smoke test passed"
              exit 0
            fi
            if [ "$health_status" = "unhealthy" ]; then
              echo "Smoke test failed: health status is '$health_status'"
              docker inspect --format='{{json .State.Health}}' playwright-http-smoke || true
              docker logs playwright-http-smoke || true
              exit 1
            fi
            sleep 2
          done
          echo "Smoke test failed: container did not become healthy"
          docker ps -a --filter name=playwright-http-smoke
          docker inspect --format='{{json .State.Health}}' playwright-http-smoke || true
          docker logs playwright-http-smoke
          exit 1

      - name: Cleanup smoke test container
        if: always()
        shell: bash
        run: docker rm -f playwright-http-smoke || true

  publish:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs:
      - security
      - test
      - docker_security
      - docker_smoke
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set image name
        id: image_name
        shell: bash
        run: echo "value=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image_name.outputs.value }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.chainguard
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
