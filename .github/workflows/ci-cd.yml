name: CI and Publish

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  security:
    name: Security Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Export production requirements
        run: uv export --frozen --no-dev --no-emit-project --format requirements-txt -o requirements-ci.txt

      - name: Audit Python dependencies (high+)
        run: uvx pip-audit -r requirements-ci.txt

      - name: OSV dependency scan
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            -w /src \
            ghcr.io/google/osv-scanner:v2.3.5 \
            scan --lockfile=uv.lock

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"

  test:
    name: Test and Build
    runs-on: ubuntu-latest
    env:
      AVAILABLE_BROWSERS: chromium-headless
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Install Chromium
        run: uv run playwright install chromium --with-deps

      - name: Run tests
        run: uv run pytest -q

      - name: Build package
        run: uv build

  docker_security:
    name: Docker Security Gate
    runs-on: ubuntu-latest
    needs:
      - security
      - test
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for security scan
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          push: false
          tags: local/playwright-http:${{ github.sha }}

      - name: Trivy image scan (blocking)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: local/playwright-http:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"

  publish:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs:
      - security
      - test
      - docker_security
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        shell: bash
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
